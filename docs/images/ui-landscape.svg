<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Landscape crossword app UI preview</title>
  <desc id="desc">A cozy crossword app in landscape with the clues panel on the left and the puzzle board on the right.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#1c1a14" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1280" height="820" fill="#f4f6ef"/>
  <rect x="0" y="0" width="1280" height="820" fill="#faf0dc" opacity="0.4"/>

  <g filter="url(#shadow)">
    <rect x="54" y="54" width="390" height="712" rx="10" fill="#fffef6" stroke="#b3b39e" stroke-opacity="0.7"/>

    <rect x="82" y="82" width="44" height="40" rx="8" fill="#1f6e6e"/>
    <text x="104" y="108" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#fffef6">⚙</text>
