    <text x="82" y="420" font-family="Georgia, serif" font-weight="700" font-size="18" fill="#1d1f1f">Across</text>
    <rect x="82" y="438" width="334" height="34" rx="7" fill="#f0e6cc"/>
    <text x="108" y="461" text-anchor="end" font-family="Georgia, serif" font-weight="700" font-size="14" fill="#6b6352">1.</text>
    <text x="122" y="461" font-family="Georgia, serif" font-size="15" fill="#1d1f1f">It beats in your chest</text>
    <text x="108" y="503" text-anchor="end" font-family="Georgia, serif" font-weight="700" font-size="14" fill="#6b6352">3.</text>
    <text x="122" y="503" font-family="Georgia, serif" font-size="15" fill="#6b6352">General direction things are moving</text>
    <text x="82" y="562" font-family="Georgia, serif" font-weight="700" font-size="18" fill="#1d1f1f">Down</text>
    <text x="108" y="603" text-anchor="end" font-family="Georgia, serif" font-weight="700" font-size="14" fill="#6b6352">1.</text>
    <text x="122" y="603" font-family="Georgia, serif" font-size="15" fill="#6b6352">Glowing piece after a fire</text>
    <text x="108" y="644" text-anchor="end" font-family="Georgia, serif" font-weight="700" font-size="14" fill="#6b6352">2.</text>
    <text x="122" y="644" font-family="Georgia, serif" font-size="15" fill="#6b6352">A principle or belief</text>
