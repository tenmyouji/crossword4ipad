    <text x="333" y="173" text-anchor="middle" font-family="Georgia, serif" font-weight="600" font-size="16" fill="#1c6b6b">Down</text>

    <rect x="82" y="212" width="334" height="82" rx="8" fill="#e0f0e6" stroke="#1f6e6e" stroke-opacity="0.15"/>
    <text x="104" y="242" font-family="Georgia, serif" font-size="14" fill="#1f6e6e">3 Across</text>
    <text x="104" y="270" font-family="Georgia, serif" font-size="18" fill="#1d1f1f">General direction things are moving</text>

    <rect x="82" y="316" width="158" height="42" rx="8" fill="#fffef6" stroke="#1f6e6e" stroke-opacity="0.35"/>
